<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Sớ & Bài Vị</title>
    <style>
        /* --- GIAO DIỆN WEB --- */
        body { font-family: Arial, sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #f1f1f1; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .tab-btn.active { background: #b71c1c; color: white; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .flex-row > div { flex: 1; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; margin-top: 10px;}
        .hidden { display: none !important; }
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f5f5f5; }
        .btn-in-nhanh { color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px; margin-bottom: 5px; }

        /* --- CSS IN ẤN --- */
        #printArea { display: none; }
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { padding: 0; background: white; }
            .container { display: none; }
            #printArea { display: block; }
            
            .page-kieu-ngan { width: 210mm; height: 297mm; padding: 10mm; box-sizing: border-box; page-break-after: always; display: flex; flex-direction: row; gap: 10mm; font-family: 'Times New Roman', serif; }
            .half-page { width: 50%; height: 100%; border: 4px double #333; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; }
            .cs-container-flex { margin-top: auto; padding-top: 20px; border-top: 2px dotted #000; }

            .page-kieu-dai { width: 210mm; height: 297mm; max-height: 297mm; position: relative; page-break-after: always; break-after: page; page-break-inside: avoid; break-inside: avoid; font-family: 'Times New Roman', serif; overflow: hidden; }
            .fake-box-l, .fake-box-r { position: absolute; top: 10mm; bottom: 10mm; width: 90mm; border: 4px double #333; box-sizing: border-box; }
            .fake-box-l { left: 10mm; } .fake-box-r { right: 10mm; }
            .content-flow { position: absolute; top: 15mm; bottom: 15mm; left: 15mm; right: 15mm; column-count: 2; column-gap: 20mm; column-fill: auto; z-index: 1; }
            .cs-block-flow { margin-top: 60px; border-top: 2px dotted #000; padding-top: 20px; }

           /* Định dạng chữ */
            .ma-bv { position: absolute; top: 10px; left: 15px; font-size: 18px; font-weight: bold;} 
            .title-red { color: red !important; font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 15px; text-transform: uppercase;} 
            .tc-content { white-space: pre-line; line-height: 1.8; font-size: 24px; text-align: center; } 
            
            /* Dành cho Cá Nhân */
            .hl-name { font-size: 36px; font-weight: bold; margin: 15px 0; text-align: center;} 
            .pd-name { font-size: 26px; font-weight: bold; margin-bottom: 15px; text-align: center;} 
            .details { font-size: 22px; line-height: 1.8; margin-bottom: 5px; text-align: center; } 
            .phoi-tien { font-size: 22px; text-align: left; line-height: 1.8; } 
            
            /* Dành cho Danh sách Cúng Chung */
            .cc-list-name { font-size: 32px; font-weight: bold; text-align: center; margin-top: 10px; break-after: avoid; page-break-after: avoid; } 
            .cc-list-sub { font-size: 24px; font-weight: bold; text-align: center; margin-top: 2px; break-before: avoid; page-break-before: avoid; } 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <a href="index.html" style="background-color: #34495e; color: white; text-decoration: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; display: flex; align-items: center; justify-content: center;">🏠 Menu Chính</a>
            <button class="tab-btn active" id="btnTabNhap" onclick="chuyenTab('nhapLieu')">📝 Nhập Liệu</button>
            <button class="tab-btn" id="btnTabTim" onclick="chuyenTab('timKiem')">🔍 Tìm Kiếm & In</button>
        </div>

        <div id="tabNhapLieu">
            <div class="flex-row">
                <div class="form-group">
                    <label>Loại Phiếu Nhập</label>
                    <select id="loaiSo" onchange="doiLoaiForm()">
                        <option value="CaNhan">Cá Nhân (1 Hương Linh)</option>
                        <option value="CungChung">Cúng Chung (Nhiều Hương Linh)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kiểu In (Căn chỉnh khổ giấy)</label>
                    <select id="kieuIn">
                        <option value="ngan">Kiểu Ít Người (2 Bản chung 1 tờ A4)</option>
                        <option value="dai">Kiểu Đông Người (Tràn 2 cột / In 2 tờ A4)</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group hidden" id="khuVucMaBV">
                <label>Mã Bài Vị Cúng Chung</label>
                <input type="text" id="inMaBV" style="background: #e3f2fd; font-weight: bold;" readonly>
            </div>

            <div class="form-group">
                <label>Trai Chủ / Gia Chủ</label>
                <textarea id="inTraiChu" placeholder="VD: Lâm Minh Hà" style="height: 100px; text-align: center;"></textarea>
            </div>

            <div id="formCaNhan">
                <div class="flex-row">
                    <div><label>Tên Hương Linh</label><input type="text" id="inTen"></div>
                    <div><label>Pháp Danh</label><input type="text" id="inPhapDanh"></div>
                </div>
                <div class="flex-row">
                    <div><label>Ngày Sanh</label><input type="text" id="inSanh"></div>
                    <div><label>Tuổi</label><input type="text" id="inTuoi" placeholder="VD: 58 (Chỉ cần gõ số)"></div>
                </div>
                <div class="flex-row">
                    <div><label>Mất (Âm Lịch)</label><input type="text" id="inMatAL"></div>
                    <div><label>Mất (Dương Lịch)</label><input type="text" id="inMatDL"></div>
                </div>
                <div class="form-group">
                    <label>Phối Tiến (Cầu siêu thêm)</label>
                    <textarea id="inPhoiTien" placeholder="Mỗi người 1 dòng..."></textarea>
                </div>
            </div>

            <div id="formCungChung" class="hidden">
                <div class="form-group" style="margin-top: 15px;">
                    <label style="color: #b71c1c; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Danh Sách Cầu Siêu (Mỗi người 1 dòng)</label>
                    <textarea id="inDanhSachCC" style="height: 250px; text-align: center;" placeholder="Gõ danh sách vào đây..."></textarea>
                </div>
            </div>

            <button class="btn-action" id="btnLuu" style="background: #2e7d32;" onclick="luuDuLieu()">💾 Lưu Mới Lên Trang Tính</button>
            <button class="btn-action hidden" id="btnHuySua" style="background: #7f8c8d; margin-top: 5px;" onclick="huyCheDoSua()">❌ Hủy Chỉnh Sửa (Thêm Mới)</button>
            
            <button class="btn-action" style="background: #d32f2f;" onclick="inTrucTiep()">🖨️ Thực Hiện In</button>
            <p id="trangThai" style="text-align: center; margin-top: 10px; font-weight: bold;"></p>
        </div>

        <div id="tabTimKiem" class="hidden">
            <div class="search-box">
                <select id="loaiTimKiem" style="width: 180px; font-weight: bold; color: #1976d2;">
                    <option value="All">Tất cả các loại</option>
                    <option value="CaNhan">Chỉ Cá Nhân</option>
                    <option value="CungChung">Chỉ Cúng Chung</option>
                </select>
                <input type="text" id="txtTimKiem" placeholder="Nhập tên Hương Linh hoặc Mã BV để tìm...">
                <button class="btn-action" style="width: auto; margin-top: 0; background: #2e7d32;" onclick="taiDuLieuTuSheets()">🔄 Tải Dữ Liệu</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Loại</th>
                        <th>Hương Linh / Mã BV</th>
                        <th>Pháp Danh</th>
                        <th style="width: 160px;">Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="bangDuLieu">
                    <tr><td colspan="4" style="text-align:center;">Bấm "Tải Dữ Liệu" để đồng bộ từ Google Sheets</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="printArea"></div>

    <script>
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLKVv-ewmboA3h93HFxPcAWDkvg6wVbMPsWnJXtYcZgHfoYIgL7KMECh5eFX10V5mZZA/exec";
        let khoDuLieu = [];
        let isEditMode = false;
        let maBVSuaCaNhan = ""; 

        function chuyenTab(tabName) {
            document.getElementById('tabNhapLieu').classList.add('hidden');
            document.getElementById('tabTimKiem').classList.add('hidden');
            document.getElementById('btnTabNhap').classList.remove('active');
            document.getElementById('btnTabTim').classList.remove('active');

            if(tabName === 'nhapLieu') {
                document.getElementById('tabNhapLieu').classList.remove('hidden');
                document.getElementById('btnTabNhap').classList.add('active');
            } else {
                document.getElementById('tabTimKiem').classList.remove('hidden');
                document.getElementById('btnTabTim').classList.add('active');
                if(khoDuLieu.length === 0) taiDuLieuTuSheets();
            }
        }

        function doiLoaiForm() {
            const loai = document.getElementById('loaiSo').value;
            if(loai === 'CaNhan') {
                document.getElementById('formCaNhan').classList.remove('hidden');
                document.getElementById('formCungChung').classList.add('hidden');
                document.getElementById('khuVucMaBV').classList.add('hidden');
            } else {
                document.getElementById('formCaNhan').classList.add('hidden');
                document.getElementById('formCungChung').classList.remove('hidden');
                document.getElementById('khuVucMaBV').classList.remove('hidden');
                if(!isEditMode) layMaBVMoi();
            }
        }

        function layMaBVMoi() {
            if(isEditMode) return; 
            const inMa = document.getElementById('inMaBV');
            inMa.value = "Đang tải...";
            fetch(GOOGLE_APP_SCRIPT_URL).then(res => res.json())
                .then(data => inMa.value = data.nextId || "")
                .catch(() => inMa.value = "");
        }

        function suaTuBang(index) {
            const hs = khoDuLieu[index];
            isEditMode = true; 
            
            document.getElementById('btnLuu').innerText = "✏️ Cập Nhật (Lưu Đè Lên Dòng Cũ)";
            document.getElementById('btnLuu').style.background = "#f39c12";
            document.getElementById('btnHuySua').classList.remove('hidden');
            
            document.getElementById('loaiSo').value = hs.loai;
            doiLoaiForm();
            
            document.getElementById('inTraiChu').value = hs.traiChu || "";
            
            if (hs.loai === "CaNhan") {
                maBVSuaCaNhan = hs.maBV; 
                document.getElementById('inTen').value = hs.ten || "";
                document.getElementById('inPhapDanh').value = hs.phapDanh || "";
                document.getElementById('inSanh').value = hs.sanh || "";
                document.getElementById('inMatAL').value = hs.matAL || "";
                document.getElementById('inMatDL').value = hs.matDL || "";
                document.getElementById('inTuoi').value = hs.tuoi || "";
                document.getElementById('inPhoiTien').value = hs.phoiTien || "";
            } else {
                document.getElementById('inMaBV').value = hs.maBV;
                document.getElementById('inDanhSachCC').value = hs.danhSachHLRaw || "";
            }
            
            chuyenTab('nhapLieu');
            window.scrollTo(0, 0);
        }

        function huyCheDoSua() {
            isEditMode = false;
            maBVSuaCaNhan = "";
            document.getElementById('btnLuu').innerText = "💾 Lưu Mới Lên Trang Tính";
            document.getElementById('btnLuu').style.background = "#2e7d32";
            document.getElementById('btnHuySua').classList.add('hidden');
            
            document.querySelectorAll('input[type="text"], textarea').forEach(el => el.value='');
            if (document.getElementById('loaiSo').value === 'CungChung') layMaBVMoi();
        }

        function taoGiaoDienIn(hs) {
            const kieuIn = document.getElementById('kieuIn').value;
            const traiChuHTML = hs.traiChu || "";
            let finalHTML = "";

            const htmlMaBV_Ngan = (hs.maBV && hs.loai === 'CungChung') ? `<div class="ma-bv">Mã BV: ${hs.maBV}</div>` : '';
            const htmlMaBV_Dai = (hs.maBV && hs.loai === 'CungChung') ? `<span style="float:left; font-size: 14px; color:#000;">Mã BV: ${hs.maBV}</span>` : '';

            // XỬ LÝ LOẠI CÁ NHÂN (CÓ PHỐI TIẾN DÀI)
            if(hs.loai === "CaNhan" || !hs.loai) {
                
                // Khởi tạo khối thông tin chính
                let mainInfoHTML = `<div class="title-red" style="border:none; margin-bottom:10px;">CẦU SIÊU</div>`;
                mainInfoHTML += `<div class="hl-name">${hs.ten || ''}</div>`;
                if(hs.phapDanh) mainInfoHTML += `<div class="pd-name">Pd: ${hs.phapDanh}</div>`;
                if(hs.sanh) mainInfoHTML += `<div class="details"><b>Sanh:</b> ${hs.sanh}</div>`;
                
                let chuoiMatDL = hs.matDL || "";
                if (chuoiMatDL.includes("T") && chuoiMatDL.includes(".000Z")) {
                    let d = new Date(chuoiMatDL);
                    let ngay = String(d.getDate()).padStart(2, '0');
                    let thang = String(d.getMonth() + 1).padStart(2, '0');
                    chuoiMatDL = `(${ngay}/${thang}/${d.getFullYear()})`;
                } else if (chuoiMatDL !== "" && !chuoiMatDL.includes("(")) {
                    chuoiMatDL = `(${chuoiMatDL})`;
                }

                if(hs.matAL && chuoiMatDL) {
                    mainInfoHTML += `<div class="details"><b>Mất:</b> ${hs.matAL} <span style="font-size: 16px;">${chuoiMatDL}</span></div>`;
                } else if (hs.matAL) {
                    mainInfoHTML += `<div class="details"><b>Mất:</b> ${hs.matAL}</div>`;
                }

                if(hs.tuoi) {
                    let chuoiTuoi = hs.tuoi;
                    const timSo = String(hs.tuoi).match(/\d+/); 
                    if(timSo) {
                        const soTuoi = parseInt(timSo[0], 10);
                        chuoiTuoi = (soTuoi < 60) ? `Hưởng dương: ${soTuoi} tuổi` : `Hưởng thọ: ${soTuoi} tuổi`;
                    }
                    mainInfoHTML += `<div class="details" style="text-align:center; margin-top:10px;">${chuoiTuoi}</div>`;
                }

                // Cắt lọc danh sách Phối Tiến
                let phoiTienItems = [];
                if (hs.phoiTien) {
                    const ptLines = hs.phoiTien.split('\n');
                    let currItem = "";
                    ptLines.forEach(line => {
                        if(line.trim() !== '') {
                            if(line.toLowerCase().includes('pd:') || line.toLowerCase().includes('tức:')) {
                                currItem += `<div class="phoi-tien" style="margin-top:2px;">${line.trim()}</div>`;
                            } else {
                                if (currItem !== "") phoiTienItems.push(currItem);
                                currItem = `<div class="phoi-tien" style="font-weight:bold; margin-top:5px;">${line.trim()}</div>`;
                            }
                        }
                    });
                    if (currItem !== "") phoiTienItems.push(currItem);
                }
                
                if (kieuIn === "ngan") {
                    let fullPhoiTienHTML = mainInfoHTML;
                    if (phoiTienItems.length > 0) {
                        fullPhoiTienHTML += `<div class="phoi-tien" style="padding-top:10px; margin-top:15px;"><u>Phối tiến:</u></div>`;
                        phoiTienItems.forEach(item => fullPhoiTienHTML += item);
                    }
                    
                    const templateNuaTo = `
                        <div class="half-page">
                            <div class="title-red" style="border-bottom: 1px solid #333; padding-bottom:5px;">TRAI CHỦ</div>
                            <div class="tc-content">${traiChuHTML}</div>
                            <div class="cs-container-flex">${fullPhoiTienHTML}</div>
                        </div>
                    `;
                    finalHTML = `<div class="page-kieu-ngan">${templateNuaTo}${templateNuaTo}</div>`;
                } else {
                    let pagesHTML = "";
                    let currentIndex = 0;
                    let pageNum = 0;

                    if (phoiTienItems.length === 0) {
                        // Nếu không có phối tiến, in 1 trang bình thường
                        pagesHTML += `
                            <div class="page-kieu-dai">
                                <div class="fake-box-l"></div>
                                <div class="fake-box-r"></div>
                                <div class="content-flow">
                                    <div class="title-red" style="border-bottom: 1px solid #333; padding-bottom:5px;">
                                        TRAI CHỦ
                                    </div>
                                    <div class="tc-content">${traiChuHTML}</div>
                                    <div class="cs-block-flow">${mainInfoHTML}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Nếu CÓ PHỐI TIẾN DÀI -> CHIA TRANG TỰ ĐỘNG
                        while (currentIndex < phoiTienItems.length || pageNum === 0) {
                            pageNum++;
                            let isFirstPage = (pageNum === 1);
                            
                            // Trang 1 chừa chỗ cho Trai Chủ + HL Chính (chỉ nhét được ~6 người)
                            // Trang 2 rỗng hoàn toàn (nhét được ~18 người)
                            let itemsForThisPage = isFirstPage ? 6 : 18; 
                            
                            let chunk = phoiTienItems.slice(currentIndex, currentIndex + itemsForThisPage);
                            currentIndex += itemsForThisPage;

                            let headerHTML = "";
                            let csBlockStyle = "";
                            let blockContent = "";

                            if (isFirstPage) {
                                headerHTML = `
                                    <div class="title-red" style="border-bottom: 1px solid #333; padding-bottom:5px;">
                                        TRAI CHỦ
                                    </div>
                                    <div class="tc-content">${traiChuHTML}</div>
                                `;
                                blockContent = mainInfoHTML + `<div class="phoi-tien" style="padding-top:10px; margin-top:15px;"><u>Phối tiến:</u></div>`;
                            } else {
                                // MỚI: Ẩn Gia Chủ ở trang 2 trở đi, kẻ viền khung danh sách và gạch dưới chữ CẦU SIÊU
                                csBlockStyle = `style="margin-top: 0; border: 1px solid #333; padding: 15px; border-radius: 5px;"`;
                                blockContent = `
                                    <div class="title-red" style="border-bottom: 1px dashed #333; padding-bottom:10px; margin-bottom:12px; margin-top:0;">CẦU SIÊU</div>
                                    <div class="phoi-tien" style="margin-top:0; margin-bottom:10px;"><u>Phối tiến (tiếp theo):</u></div>
                                `;
                            }
                            
                            // Nối tên phối tiến vào block
                            chunk.forEach(item => blockContent += item);
                            
                            pagesHTML += `
                                <div class="page-kieu-dai">
                                    <div class="fake-box-l"></div>
                                    <div class="fake-box-r"></div>
                                    <div class="content-flow">
                                        ${headerHTML}
                                        <div class="cs-block-flow" ${csBlockStyle}>${blockContent}</div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                    
                    // Nối kết quả 2 lần (để thỏa mãn điều kiện 2 bản in)
                    finalHTML = pagesHTML + pagesHTML;
                }
            } 
            // XỬ LÝ LOẠI CÚNG CHUNG
            else {
                const textDanhSach = hs.danhSachHLRaw || "";
                const lines = textDanhSach.split('\n');
                
                let danhSachItems = [];
                let currentItem = "";
                
                lines.forEach(line => {
                    if(line.trim() !== '') {
                        if(line.toLowerCase().includes('pd:') || line.toLowerCase().includes('tức:')) {
                            currentItem += `<div class="cc-list-sub">${line.trim()}</div>`;
                        } else {
                            if (currentItem !== "") danhSachItems.push(currentItem);
                            currentItem = `<div class="cc-list-name">${line.trim()}</div>`;
                        }
                    }
                });
                if (currentItem !== "") danhSachItems.push(currentItem);

                if (kieuIn === "ngan") {
                    let inThongTinCauSieu = `<div class="title-red" style="border:none; margin-bottom:10px;">CẦU SIÊU</div>`;
                    danhSachItems.forEach(item => inThongTinCauSieu += item);
                    
                    const templateNuaTo = `
                        <div class="half-page">
                            ${htmlMaBV_Ngan}
                            <div class="title-red" style="border-bottom: 1px solid #333; padding-bottom:5px;">TRAI CHỦ</div>
                            <div class="tc-content">${traiChuHTML}</div>
                            <div class="cs-container-flex">${inThongTinCauSieu}</div>
                        </div>
                    `;
                    finalHTML = `<div class="page-kieu-ngan">${templateNuaTo}${templateNuaTo}</div>`;
                } else {
                    let pagesHTML = "";
                    let currentIndex = 0;
                    let pageNum = 0;
                    
                    if (danhSachItems.length === 0) danhSachItems = ["<div class='cc-list-name'>&nbsp;</div>"];

                    while (currentIndex < danhSachItems.length || pageNum === 0) {
                        pageNum++;
                        let isFirstPage = (pageNum === 1);
                        
                        let itemsForThisPage = isFirstPage ? 12 : 18; 
                        
                        let chunk = danhSachItems.slice(currentIndex, currentIndex + itemsForThisPage);
                        currentIndex += itemsForThisPage;

                        let inThongTinCauSieu = isFirstPage ? `<div class="title-red" style="border:none; margin-bottom:10px;">CẦU SIÊU</div>` : ``;
                        chunk.forEach(item => inThongTinCauSieu += item);
                        
                        let headerHTML = "";
                        let csBlockStyle = "";

                        if (isFirstPage) {
                            headerHTML = `
                                <div class="title-red" style="border-bottom: 1px solid #333; padding-bottom:5px;">
                                    ${htmlMaBV_Dai}
                                    TRAI CHỦ
                                </div>
                                <div class="tc-content">${traiChuHTML}</div>
                            `;
                        } else {
                            csBlockStyle = `style="margin-top: 0; border-top: none; padding-top: 0;"`;
                        }
                        
                        pagesHTML += `
                            <div class="page-kieu-dai">
                                <div class="fake-box-l"></div>
                                <div class="fake-box-r"></div>
                                <div class="content-flow">
                                    ${headerHTML}
                                    <div class="cs-block-flow" ${csBlockStyle}>${inThongTinCauSieu}</div>
                                </div>
                            </div>
                        `;
                    }
                    
                    finalHTML = pagesHTML + pagesHTML;
                }
            }
            return finalHTML;
        }

        function thucHienLenhIn(hs) { document.getElementById('printArea').innerHTML = taoGiaoDienIn(hs); window.print(); }

        function inTrucTiep() {
            const loai = document.getElementById('loaiSo').value;
            let hs = { loai: loai, traiChu: document.getElementById('inTraiChu').value, maBV: loai === 'CungChung' ? document.getElementById('inMaBV').value : null };
            if(loai === 'CaNhan') {
                hs.ten = document.getElementById('inTen').value; hs.phapDanh = document.getElementById('inPhapDanh').value;
                hs.sanh = document.getElementById('inSanh').value; hs.matAL = document.getElementById('inMatAL').value;
                hs.matDL = document.getElementById('inMatDL').value; hs.tuoi = document.getElementById('inTuoi').value;
                hs.phoiTien = document.getElementById('inPhoiTien').value;
            } else { hs.danhSachHLRaw = document.getElementById('inDanhSachCC').value; }
            thucHienLenhIn(hs);
        }

        function inTuBang(index) { thucHienLenhIn(khoDuLieu[index]); }

        function luuDuLieu() {
            const loai = document.getElementById('loaiSo').value;
            const payload = {
                action: isEditMode ? "update" : "insert", 
                loai: loai,
                traiChu: document.getElementById('inTraiChu').value,
            };

            if(loai === 'CaNhan') {
                payload.maBV = isEditMode ? maBVSuaCaNhan : ""; 
                payload.ten = document.getElementById('inTen').value;
                payload.phapDanh = document.getElementById('inPhapDanh').value;
                payload.sanh = document.getElementById('inSanh').value;
                payload.matAL = document.getElementById('inMatAL').value;
                payload.matDL = document.getElementById('inMatDL').value;
                payload.tuoi = document.getElementById('inTuoi').value;
                payload.phoiTien = document.getElementById('inPhoiTien').value;
            } else {
                payload.maBV = document.getElementById('inMaBV').value;
                payload.danhSachHLRaw = document.getElementById('inDanhSachCC').value;
            }

            const txt = document.getElementById('trangThai');
            txt.style.color = "blue"; txt.innerText = isEditMode ? "Đang cập nhật lại..." : "Đang gửi lên Sheets...";

            fetch(GOOGLE_APP_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => {
                    txt.style.color = "green"; txt.innerText = isEditMode ? "✅ Cập nhật thành công!" : "✅ Lưu thành công!";
                    huyCheDoSua(); 
                    setTimeout(() => txt.innerText = "", 3000);
                }).catch(() => {
                    txt.style.color = "red"; txt.innerText = "❌ Lỗi kết nối!";
                });
        }

        function taiDuLieuTuSheets() {
            const tbody = document.getElementById('bangDuLieu');
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">⏳ Đang tải dữ liệu từ Trang Tính...</td></tr>`;
            
            fetch(GOOGLE_APP_SCRIPT_URL + "?action=search")
                .then(res => res.json())
                .then(data => { khoDuLieu = data; hienThiBang(); })
                .catch(err => { tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:red;">Lỗi tải dữ liệu!</td></tr>`; });
        }

        function hienThiBang() {
            const tuKhoa = document.getElementById('txtTimKiem').value.toLowerCase();
            const loaiTim = document.getElementById('loaiTimKiem').value;
            const tbody = document.getElementById('bangDuLieu');
            tbody.innerHTML = "";

            let ketQua = khoDuLieu;
            if(loaiTim !== 'All') { ketQua = ketQua.filter(hs => hs.loai === loaiTim); }

            if(tuKhoa !== '') {
                ketQua = ketQua.filter(hs => {
                    if(hs.loai === "CaNhan") {
                        return (hs.ten && hs.ten.toLowerCase().includes(tuKhoa)) || (hs.phapDanh && hs.phapDanh.toLowerCase().includes(tuKhoa));
                    } else {
                        return (hs.maBV && String(hs.maBV).includes(tuKhoa)) || (hs.danhSachHLRaw && hs.danhSachHLRaw.toLowerCase().includes(tuKhoa));
                    }
                });
            }

            const ketQuaHienThi = ketQua.slice(0, 50);

            if(ketQuaHienThi.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Không tìm thấy hồ sơ phù hợp!</td></tr>`; return;
            }

            ketQuaHienThi.forEach(hs => {
                let hienThiTen = "";
                if (hs.loai === "CaNhan") {
                    const hienThiMatAL = hs.matAL ? `<br><span style="font-size:13px; color:#e67e22;">Ngày mất (AL): ${hs.matAL}</span>` : '';
                    hienThiTen = `<b>${hs.ten}</b>${hienThiMatAL}`;
                } else {
                    let tenDauTien = "Đang tải tên...";
                    if(hs.danhSachHLRaw) {
                        const lines = hs.danhSachHLRaw.split('\n').map(l => l.trim()).filter(l => l !== '');
                        const lineHopLe = lines.find(l => !l.toLowerCase().startsWith('pd:') && !l.toLowerCase().startsWith('tức:'));
                        if(lineHopLe) tenDauTien = lineHopLe.split('-')[0].trim(); 
                    }
                    hienThiTen = `Mã: ${hs.maBV} <br><b style="color:#b71c1c; font-size:16px;">${tenDauTien}</b> <br><span style="font-size:12px;color:#555;">(và những người khác...)</span>`;
                }

                const indexGoc = khoDuLieu.indexOf(hs);

                tbody.innerHTML += `
                    <tr>
                        <td>${hs.loai === "CaNhan" ? "Cá Nhân" : "Cúng Chung"}</td>
                        <td>${hienThiTen}</td>
                        <td>${hs.phapDanh || ''}</td>
                        <td>
                            <button class="btn-in-nhanh" style="background:#f39c12;" onclick="suaTuBang(${indexGoc})">✏️ Sửa</button>
                            <button class="btn-in-nhanh" style="background:#d32f2f;" onclick="inTuBang(${indexGoc})">🖨️ In Lại</button>
                        </td>
                    </tr>
                `;
            });

            if(ketQua.length > 50) {
                tbody.innerHTML += `<tr><td colspan="4" style="text-align:center; color:#d32f2f; font-style:italic;">Còn ${ketQua.length - 50} kết quả khác đang bị ẩn. Vui lòng nhập thêm từ khóa để tìm chính xác hơn.</td></tr>`;
            }
        }

        document.getElementById('txtTimKiem').addEventListener('input', hienThiBang);
        document.getElementById('loaiTimKiem').addEventListener('change', hienThiBang);
        
        doiLoaiForm();
    </script>
</body>
</html>
